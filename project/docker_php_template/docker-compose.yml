# Access Server: http://localhost:8080
# Files: ./htdocs

# Access phpMyAdmin: http://localhost:8081
# Username: root
# Password: rootpassword

# MySQL Database
# servername: db
# port: 3306
# username: root
# password: rootpassword

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-app
    volumes:
      - ./htdocs:/var/www/html
    ports:
      - "8080:80"
    depends_on:
      - db_server
    networks:
      - docker_php_network
 

  db_server:
    image: mysql:latest
    container_name: mysql-db
    restart: no
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - docker_php_network
 
  adminer:
    image: adminer:latest
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db_server
    networks:
      - docker_php_network
 
volumes:
  db_data:
 
networks:
  docker_php_network: